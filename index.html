<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sal Priadi - Merchandise</title>
    <link rel="icon" href="assets/logo-ico.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="logo">
        <img src="assets/logo.svg" alt="Logo">
    </div>

    <button class="btn-p" onclick="window.open('https://www.instagram.com/pertunjukanpertunjukan', '_blank')">
        (p)
    </button>

    <div class="social-media">
        <i class="fab fa-instagram"></i>
        <i class="fab fa-tiktok"></i>
        <i class="fab fa-x-twitter"></i>
        <i class="fab fa-youtube"></i>
    </div>
</nav>

<div id="product-view">
    <div class="close-view" id="close-btn"><i class="fas fa-times"></i></div>
    <img src="" id="full-img" class="full-bg-img">
    <div class="view-overlay">
        <h2 id="full-title">PRODUCT</h2>
        <img class="hero-mobile" src="assets/hero-image-mobile.png" alt="">
        <a href="#" target="_blank" class="btn-view-shop" id="shop-btn">Shop Now</a>
    </div>
</div>

<div class="hero">
    <img src="assets/hero-image.png" class="hero-main">
    <button class="hero-btn" onclick="window.open('https://toco.id/store/toko-suvenir-priadi', '_blank')">
        Shop Now
    </button>

    <div class="thumbnail-wrapper">
        <button class="nav-btn left-btn"><i class="fas fa-chevron-left"></i></button>
        <div class="product-thumbnail" id="thumb">
            <img src="assets/product1.png" data-name="Golden Retriever" data-link="https://toco.id/product1">
            <img src="assets/product2.png" data-name="White Berhati" data-link="https://toco.id/product2">
            <img src="assets/product3.png" data-name="Pal Sriadi" data-link="https://toco.id/product3">
            <img src="assets/product4.png" data-name="Priadi Pizza" data-link="https://toco.id/product4">
            <img src="assets/product5.png" data-name="Hoodie" data-link="https://toco.id/product5">
        </div>
        <button class="nav-btn right-btn"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<div id="trail-container"></div>

<script src="script.js"></script>
</body>
</html>
