<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sal Priadi - Fullscreen Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="logo"><img src="assets/logo.svg"></div>
    <div class="social-media">
        <i class="fab fa-instagram"></i>
        <i class="fab fa-tiktok"></i>
        <i class="fab fa-x-twitter"></i>
        <i class="fab fa-youtube"></i>
    </div>
</nav>

<div id="product-view">
    <div class="close-view" id="close-btn"><i class="fas fa-times"></i></div>
    <img src="" id="full-img" class="full-bg-img">
    <div class="view-overlay">
        <h2 id="full-title">PRODUCT</h2>
        <a href="#" target="_blank" class="btn-view-shop" id="shop-btn">Shop Now</a>
    </div>
</div>

<div class="hero">
    <img src="assets/hero-image.png" class="hero-main">
    <button class="hero-btn">Shop Now</button>

    <div class="thumbnail-wrapper">
        <button class="nav-btn left-btn"><i class="fas fa-chevron-left"></i></button>
        
        <div class="product-thumbnail" id="thumb">
            <img src="assets/product1.png" data-name="Golden Retriever" data-link="https://tokopedia.com/product1">
            <img src="assets/product2.png" data-name="White Berhati" data-link="https://tokopedia.com/product2">
            <img src="assets/product3.png" data-name="Pal Sriadi" data-link="https://tokopedia.com/product3">
            <img src="assets/product4.png" data-name="Priadi Pizza" data-link="https://tokopedia.com/product4">
            <img src="assets/product5.png" data-name="Hoodie" data-link="https://tokopedia.com/product5">
        </div>

        <button class="nav-btn right-btn"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<img src="assets/product1.png" class="layer">
<img src="assets/product2.png" class="layer">
<img src="assets/product3.png" class="layer">
<img src="assets/product4.png" class="layer">

<script src="script.js"></script>
</body>
</html>
